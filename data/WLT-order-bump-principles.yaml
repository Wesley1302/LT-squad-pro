# data/WLT-order-bump-principles.yaml
# Knowledge pack de order bumps. Consumido por: WLT-offer-architect, WLT-video-ads-builder, WLT-static-ads-builder.
meta:
  origin: "existe-no-metodo (Playbook V3, Desafio Bloco 5): ~30% do lucro mora nos bumps."
  posicao_no_metodo: "DEPOIS de validate-miojo-product, ANTES da oferta completa. Etapa obrigatória, não detalhe."

logica:
  produto_principal: "Resolve a dor principal (sapato apertado)."
  order_bump: "Completa o PRÓXIMO passo natural do mesmo problema. Não compete."
  upsell: "Acelera/aprofunda DEPOIS que intenção de compra foi confirmada (~3x ticket, ~5% conv, pós-pedido)."

regra_de_ouro: "Bump não compete, bump completa. Não é 'ou isso ou aquilo' (outro problema). É 'já que vai usar isso, leva também aquilo' (próximo passo do mesmo problema)."

3_angulos:
  analise:
    o_que: "Aplica o produto ao caso específico do comprador."
    exemplo: "Produto = roteiros; bump = análise do perfil dele."
  execucao:
    o_que: "Ajuda a implementar o que comprou."
    exemplo: "Produto = scripts; bump = gravação/edição/aplicação no celular."
  expansao:
    o_que: "Próximo canal, formato ou variação. Mesmo público."
    exemplo: "Produto = roteiros de Reels; bump = 120 stories / carrosséis / headlines / calendário."

inputs_de_criacao:
  - produto_principal_validado
  - sapato_apertado
  - proxima_objecao_do_comprador
  - proximo_passo_logico_do_comprador

preco:
  sugestao: "aprox. 20-35% do principal (playbook: ~1/3, R$18-27; mod.3: R$14-21 p/ R$67; mod.14: até ~30% no início dos testes). Conversão 16-39%."
  regra: "Barato o bastante pra marcar SEM PENSAR. Se precisa 'pensar' no preço, tá caro. Maior âncora (% off) = mais conversão."
  nota: "Não é regra cega — use contexto, ticket, percepção de valor e simplicidade."

criterios_validacao:
  - "Completa o produto principal?"
  - "Não compete com o produto principal?"
  - "Barato o suficiente pra marcar sem pensar?"
  - "Percepção de valor imediata?"
  - "Relação direta com a intenção de compra?"
  - "Entrega simples?"
  - "Aumenta ticket médio sem confundir a promessa?"
  - "Não transforma a oferta em bagunça?"
  - "Explicável em 1 frase?"
  - "Nome autoexplicativo?"

case_real: "300 Roteiros · 80 vendas: bumps = 30,9% do lucro (R$1.169,86 de R$3.786,82)."

criativos_e_bumps:
  regra_front_end: "Criativo front-end vende o PRODUTO PRINCIPAL. Não vende bump diretamente se prejudica clareza. Pode preparar desejo/contexto/percepção de valor pra esteira."
  retargeting: "Criativos de retargeting podem usar ângulos de expansão, complemento, prova, bônus e próximo passo (bump/upsell)."
  matriz: "Todo criativo registra role_in_funnel (ver WLT-creative-matrix-template)."

medicao: # existe-no-metodo (mod.14 §4)
  formula: "compras com order bump ÷ total de compras × 100"
  referencia: "boa conversão ~30-40%. Monitorar por período e por produto antes de trocar a oferta."

alerta_excesso: "existe-no-metodo (mod.11 §8): EXCESSO de order bumps derruba a conversão do checkout. Bump completa, não entulha."

downsell: # existe-no-metodo (mod.14 §6)
  o_que: "Versão menor, período menor ou preço reduzido, oferecida quando a pessoa RECUSA o upsell."
  regra: "Não pode conflitar com o que já foi comprado nem desvalorizar a oferta original."
